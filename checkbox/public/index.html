<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkBOx</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 35%, #e0f2fe 70%, #ecfdf5 100%);
            background-attachment: fixed;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            padding-top: 100px; /* Space for the fixed nav bar */
            position: relative;
            overflow-x: hidden;
        }

        /* Top bar for user info */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            gap: 1.5rem;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-name::before {
            content: "✨";
            font-size: 1.1rem;
        }

        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-login {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
            filter: brightness(1.1);
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.7);
            color: #64748b;
            border: 1px solid rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(4px);
        }
        .btn-logout:hover {
            background: #ffffff;
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        h1 {
            font-weight: 700;
            font-size: 3.5rem;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #4f46e5, #9333ea, #db2777);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.05em;
            animation: gradientShift 6s ease-in-out infinite alternate;
            position: relative;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 2.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 600;
            position: relative;
            z-index: 1;
            opacity: 0.8;
        }

        #container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 0.85rem;
            max-width: 520px;
            width: 100%;
            justify-items: center;
        }

        /* individual checkbox wrapper trick for gradient border */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            width: 2rem;
            height: 2rem;
            background: linear-gradient(145deg, #f5f3ff, #fce7f3);
            border: 2px solid transparent;
            border-radius: 8px;
            background-clip: padding-box;
            outline: 3px solid rgba(139, 92, 246, 0.15);
            outline-offset: -1px;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        input[type="checkbox"]::before {
            content: "";
            width: 0.9rem;
            height: 0.9rem;
            transform: scale(0) rotate(-45deg);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: white;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            outline-color: rgba(139, 92, 246, 0.35);
            transform: scale(1.1);
            box-shadow: 0 4px 15px -3px rgba(139, 92, 246, 0.45);
        }

        input[type="checkbox"]:checked::before {
            transform: scale(1) rotate(0deg);
        }

        input[type="checkbox"]:hover {
            outline-color: rgba(236, 72, 153, 0.4);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 16px -4px rgba(139, 92, 246, 0.25);
        }

        input[type="checkbox"]:active {
            transform: scale(0.92);
        }

        /* numbered counter */
        .counter {
            position: relative;
            z-index: 1;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 400;
        }

        .counter span {
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>
    <!-- Top bar for auth status -->
    <div class="top-bar" id="topBar">
        <a href="/login" class="btn btn-login" id="loginBtn">Login</a>
    </div>

    <h1>CheckBox</h1>
    <p class="subtitle">click them all</p>
    <div id="error-msg" style="color: red; text-align: center; font-weight: bold; min-height: 24px; margin-bottom: 10px;"></div>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io()
        const parent = document.getElementById('container')
        const errorMsg = document.getElementById('error-msg')
        const topBar = document.getElementById('topBar')
        const loginBtn = document.getElementById('loginBtn')
        let lastClickTime = 0
        let isLoggedIn = false

        // Check auth status on page load
        async function checkAuth() {
            try {
                const res = await fetch('/api/me')
                const data = await res.json()
                if (data.loggedIn) {
                    isLoggedIn = true
                    topBar.innerHTML = `
                        <span class="user-name">👋 Hello, ${data.name}</span>
                        <a href="/logout" class="btn btn-logout">Logout</a>
                    `
                }
            } catch {
                // Not logged in, keep default login button
            }
        }

        window.addEventListener('load', async () => {
            // Check auth first
            await checkAuth()

            const response = await fetch('/checkboxes', { method: 'GET' })
            const data = await response.json()
            if (data && data.checkboxes) {
                data.checkboxes.forEach((serverValue, index) => {
                    const input = document.createElement('input')
                    input.id = 'check' + index
                    input.type = 'checkbox'
                    input.checked = serverValue
                    input.addEventListener('change', (event) => {
                        if (!isLoggedIn) {
                            event.target.checked = !event.target.checked;
                            window.location.href = '/login';
                            return;
                        }

                        const now = Date.now()
                        const elapsed = now - lastClickTime
                        
                        if (elapsed < 1000 && lastClickTime !== 0) {
                            event.target.checked = !event.target.checked
                            errorMsg.innerText = `Wait a moment before clicking again.`
                        } else {
                            errorMsg.innerText = ''
                            lastClickTime = now
                            const checked = event.target.checked
                            socket.emit('client:checkbox:click', { index, checked })
                        }
                    })
                    parent.appendChild(input)
                })
            }
        })

        socket.on('server:checkbox:update', (data) => {
            console.log('server:checkbox:update', data)
            const { index, checked } = data
            const input = document.getElementById('check' + index)
            input.checked = checked
        })
    </script>
</body>

</html>
