<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkBOx</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 35%, #e0f2fe 70%, #ecfdf5 100%);
            background-attachment: fixed;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* floating blobs in the background */
        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #c4b5fd, #a78bfa);
            top: -100px;
            right: -80px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #93c5fd, #7dd3fc);
            bottom: -80px;
            left: -60px;
            animation-delay: 4s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, -20px) scale(1.08);
            }
        }

        h1 {
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #f97316);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.04em;
            animation: gradientShift 4s ease-in-out infinite alternate;
            position: relative;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        #container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow:
                0 20px 50px -12px rgba(139, 92, 246, 0.12),
                0 8px 20px -8px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 1rem;
            max-width: 580px;
            width: 100%;
            justify-items: center;
        }

        /* individual checkbox wrapper trick for gradient border */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            width: 2rem;
            height: 2rem;
            background: linear-gradient(145deg, #f5f3ff, #fce7f3);
            border: 2px solid transparent;
            border-radius: 8px;
            background-clip: padding-box;
            outline: 3px solid rgba(139, 92, 246, 0.15);
            outline-offset: -1px;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        input[type="checkbox"]::before {
            content: "";
            width: 0.9rem;
            height: 0.9rem;
            transform: scale(0) rotate(-45deg);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: white;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            outline-color: rgba(139, 92, 246, 0.35);
            transform: scale(1.1);
            box-shadow: 0 4px 15px -3px rgba(139, 92, 246, 0.45);
        }

        input[type="checkbox"]:checked::before {
            transform: scale(1) rotate(0deg);
        }

        input[type="checkbox"]:hover {
            outline-color: rgba(236, 72, 153, 0.4);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 16px -4px rgba(139, 92, 246, 0.25);
        }

        input[type="checkbox"]:active {
            transform: scale(0.92);
        }

        /* numbered counter */
        .counter {
            position: relative;
            z-index: 1;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 400;
        }

        .counter span {
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>
    <h1>CheckBox</h1>
    <p class="subtitle">click them all</p>
    <div id="error-msg" style="color: red; text-align: center; font-weight: bold; min-height: 24px; margin-bottom: 10px;"></div>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io()
        const parent = document.getElementById('container')
        const errorMsg = document.getElementById('error-msg')
        let lastClickTime = 0

        window.addEventListener('load', async () => {
            const response = await fetch('/checkboxes', { method: 'GET' })
            const data = await response.json()
            if (data && data.checkboxes) {
                data.checkboxes.forEach((serverValue, index) => {
                    const input = document.createElement('input')
                    input.id = 'check' + index
                    input.type = 'checkbox'
                    input.checked = serverValue
                    input.addEventListener('change', (event) => {
                        if (!document.cookie.includes('token=')) {
                            event.target.checked = !event.target.checked;
                            window.location.href = '/login';
                            return;
                        }

                        const now = Date.now()
                        const elapsed = now - lastClickTime
                        
                        if (elapsed < 5000 && lastClickTime !== 0) {
                            event.target.checked = !event.target.checked
                            errorMsg.innerText = `Wait for ${Math.ceil((5000 - elapsed) / 1000)} remaining sec to click next checkbox.`
                        } else {
                            errorMsg.innerText = ''
                            lastClickTime = now
                            const checked = event.target.checked
                            socket.emit('client:checkbox:click', { index, checked })
                        }
                    })
                    parent.appendChild(input)
                })
            }
        })

        // const totalCheckBox = 100



        socket.on('server:checkbox:update', (data) => {
            console.log('server:checkbox:update', data)
            const { index, checked } = data
            const input = document.getElementById('check' + index)
            input.checked = checked
        })

        //     input.id='check'+index;
        //     input.addEventListener('change', (event) => {
        //         const checked = event.target.checked
        //         console.log("Check Box changed ", { index, checked })
        //         socket.emit('client:checkbox:click', { index, checked })
        //     })
        //     parent.appendChild(input);
        // })
    </script>
</body>

</html>
