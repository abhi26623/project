<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --fg: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(15, 23, 42, 0.4);
      --ring: #3b82f6;
      --card-bg: rgba(30, 41, 59, 0.7);
      --radius: 16px;
      --btn-bg: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --btn-fg: #ffffff;
      --btn-hover: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* Premium Animated Blobs */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: float 10s ease-in-out infinite alternate;
      opacity: 0.5;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3b82f6, #8b5cf6);
      top: -150px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ec4899, #f43f5e);
      bottom: -100px; right: -50px;
      animation-delay: -5s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      padding: 2.5rem;
      position: relative;
      z-index: 10;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
    }
    .icon svg { color: #ffffff; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 400;
    }

    .form { display: flex; flex-direction: column; gap: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: 0.5rem; }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--fg);
    }

    input {
      width: 100%;
      height: 2.75rem;
      padding: 0 1rem;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--fg);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
      background: rgba(15, 23, 42, 0.6);
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .forgot {
      font-size: 0.8125rem;
      color: var(--ring);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot:hover { color: #60a5fa; }

    button[type="submit"] {
      width: 100%;
      height: 2.75rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--btn-fg);
      background: var(--btn-bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    button[type="submit"]:hover { 
      background: var(--btn-hover); 
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
    }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      font-size: 0.875rem;
      color: #fca5a5;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .footer {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--fg);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: var(--ring); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>
    </div>

    <form class="form" id="loginForm" novalidate>
      <div id="errorMsg" class="error-msg" role="alert"></div>

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Sign in</span>
      </button>
    </form>

    <div class="footer">
      Don't have an account? <a href="/signup.html">Sign up</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');

    const params = new URLSearchParams(window.location.search);
    const appName = params.get('app_name');
    if (appName) {
      document.querySelector('.subtitle').textContent = `Sign in to ${appName} to continue`;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function hideError() {
      errorMsg.style.display = 'none';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Signing in…' : 'Sign in';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in all fields.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/o/authenticate/sign-in', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password,
            client_id: params.get('client_id'),
            redirect_uri: params.get('redirect_uri'),
            state: params.get('state'),
            nonce: params.get('nonce'),
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.message || 'Something went wrong. Please try again.');
        } else if (data.redirect) {
          window.location.href = data.redirect;
        }
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
