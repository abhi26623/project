<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal | OIDC Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 35%, #e0f2fe 70%, #ecfdf5 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
            padding: 2rem;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: #18181b; }
        p.subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
        
        button {
            width: 100%;
            padding: 0.875rem;
            background: #18181b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #27272a; transform: translateY(-1px); }
        
        #result {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        #result h3 { margin-bottom: 1rem; color: #0f172a; font-size: 1.1rem; }
        .cred-box { margin-bottom: 1rem; }
        .cred-box label { color: #ef4444; margin-bottom: 0.25rem; display: block; }
        .cred-box input { background: #f1f5f9; cursor: copy; }
        .warning {
            color: #b91c1c;
            background: #fef2f2;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 1rem;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Developer Portal</h1>
        <p class="subtitle">Register your third-party application to get OIDC credentials.</p>

        <form id="register-form">
            <div class="form-group">
                <label for="appName">Application Name</label>
                <input type="text" id="appName" placeholder="e.g. Seat Booking App" required>
            </div>
            <div class="form-group">
                <label for="redirectUri">Allowed Redirect URI (Callback)</label>
                <input type="url" id="redirectUri" placeholder="e.g. http://localhost:8080/callback" required>
            </div>
            <button type="submit">Generate Credentials</button>
        </form>

        <div id="result">
            <h3>🎉 App Registered Successfully!</h3>
            <div class="cred-box">
                <label>Client ID (Public)</label>
                <input type="text" id="result-client-id" readonly onclick="this.select()">
            </div>
            <div class="cred-box">
                <label>Client Secret (Private)</label>
                <input type="text" id="result-client-secret" readonly onclick="this.select()">
            </div>
            <div class="warning">
                <strong>WARNING:</strong> Copy your Client Secret now. For security reasons, we do not store it in plain text and you will never be able to see it again!
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('appName').value;
            const redirectUri = document.getElementById('redirectUri').value;

            try {
                const res = await fetch('/api/developer/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, redirectUri })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('register-form').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result-client-id').value = data.client_id;
                    document.getElementById('result-client-secret').value = data.client_secret;
                } else {
                    alert("Registration failed.");
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred.");
            }
        });
    </script>
</body>
</html>
